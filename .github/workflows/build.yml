name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev automake build-essential

      - name: Install buildozer & cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33 python-for-android==2024.1.21

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-v2-${{ hashFiles('buildozer.spec') }}

      - name: Cache buildozer project directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-project-v2-${{ hashFiles('buildozer.spec') }}

      - name: Build APK with buildozer
        run: |
          set -o pipefail
          yes | buildozer -v android debug 2>&1 | tee buildozer_build.log

      - name: Show last 100 lines of log
        if: always()
        run: |
          echo "===== ПОСЛЕДНИЕ 100 СТРОК ЛОГА ====="
          tail -n 100 buildozer_build.log

      - name: Upload full log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer_build.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: umbala-apk
          path: bin/*.apk
